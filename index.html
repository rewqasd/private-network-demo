<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>企业/政府专网产品动态演示 V3</title>
  <style>
    /* V3 全局主题：深蓝科技底色 + 玻璃拟态卡片 + 产品专属色条 */
    :root {
      --nav-width: 306px;
      --bg-0: #06101f;
      --bg-1: #071c38;
      --bg-2: #0c2b55;
      --ink: #edf6ff;
      --ink-strong: #ffffff;
      --muted: #a8bbd4;
      --muted-2: #7f93ad;
      --glass: rgba(255, 255, 255, 0.09);
      --glass-strong: rgba(255, 255, 255, 0.14);
      --line: rgba(180, 213, 255, 0.22);
      --blue: #22b7ff;
      --cyan: #26d4ff;
      --purple: #8b5cf6;
      --orange: #f97316;
      --green: #22c55e;
      --red: #e60012;
      --gold: #f5c542;
      --grayblue: #7c9bbd;
      --radius: 8px;
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.26);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 10%, rgba(34, 183, 255, 0.18), transparent 34%),
        radial-gradient(circle at 82% 18%, rgba(139, 92, 246, 0.15), transparent 32%),
        linear-gradient(135deg, var(--bg-0), var(--bg-1) 48%, #030914);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        repeating-linear-gradient(0deg, rgba(139, 184, 255, 0.06) 0, rgba(139, 184, 255, 0.06) 1px, transparent 1px, transparent 34px),
        repeating-linear-gradient(90deg, rgba(139, 184, 255, 0.05) 0, rgba(139, 184, 255, 0.05) 1px, transparent 1px, transparent 34px);
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.25));
    }

    button {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: var(--nav-width) minmax(0, 1fr);
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .sidebar {
      height: 100vh;
      overflow: auto;
      padding: 20px 16px 18px;
      background:
        linear-gradient(180deg, rgba(8, 26, 55, 0.96), rgba(3, 11, 25, 0.98)),
        radial-gradient(circle at 18% 8%, rgba(34, 183, 255, 0.23), transparent 210px);
      border-right: 1px solid rgba(173, 214, 255, 0.15);
      box-shadow: 14px 0 36px rgba(0, 0, 0, 0.28);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 6px 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      color: #fff;
      background: linear-gradient(135deg, #e60012, #22b7ff);
      font-weight: 900;
      box-shadow: 0 0 24px rgba(34, 183, 255, 0.3);
    }

    .brand-title {
      font-size: 17px;
      font-weight: 900;
      color: #fff;
      line-height: 1.25;
    }

    .brand-subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .nav-list {
      display: grid;
      gap: 7px;
      padding-top: 14px;
    }

    .nav-item {
      --accent: var(--blue);
      --accent2: var(--cyan);
      position: relative;
      width: 100%;
      min-height: 57px;
      display: grid;
      grid-template-columns: 34px 1fr;
      align-items: center;
      gap: 10px;
      padding: 9px 10px 9px 12px;
      color: rgba(237, 246, 255, 0.8);
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: var(--radius);
      cursor: pointer;
      text-align: left;
      transition: 180ms ease;
      overflow: hidden;
    }

    .nav-item::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
    }

    .nav-item:hover,
    .nav-item:focus-visible {
      outline: none;
      color: #fff;
      transform: translateX(3px);
      background: rgba(255, 255, 255, 0.09);
      border-color: color-mix(in srgb, var(--accent) 55%, white 15%);
    }

    .nav-item.active {
      color: #fff;
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 42%, transparent), color-mix(in srgb, var(--accent2) 28%, transparent)),
        rgba(255, 255, 255, 0.09);
      border-color: color-mix(in srgb, var(--accent) 64%, white 10%);
      box-shadow: 0 0 26px color-mix(in srgb, var(--accent) 28%, transparent);
    }

    .nav-icon {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0;
      box-shadow: 0 8px 18px color-mix(in srgb, var(--accent) 24%, transparent);
    }

    .nav-kicker {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .nav-no {
      color: color-mix(in srgb, var(--accent2) 78%, white 15%);
      font-size: 11px;
      font-weight: 900;
    }

    .nav-title {
      display: block;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.2;
    }

    .nav-note {
      display: block;
      margin-top: 3px;
      color: rgba(221, 235, 255, 0.62);
      font-size: 11px;
      line-height: 1.25;
    }

    .sidebar-foot {
      margin: 16px 6px 0;
      padding-top: 12px;
      color: rgba(221, 235, 255, 0.58);
      font-size: 12px;
      line-height: 1.6;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .main {
      min-width: 0;
      height: 100vh;
      overflow: auto;
      padding: 20px 28px 24px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 16px;
      padding: 0 0 12px;
      background: linear-gradient(180deg, rgba(6, 16, 31, 0.96), rgba(6, 16, 31, 0.72) 76%, rgba(6, 16, 31, 0));
      backdrop-filter: blur(10px);
    }

    .eyebrow-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--accent-current, var(--cyan));
      font-size: 13px;
      font-weight: 900;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 0 6px color-mix(in srgb, currentColor 20%, transparent);
    }

    .page-count {
      padding: 3px 8px;
      border-radius: 999px;
      color: #dcecff;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 12px;
      font-weight: 800;
    }

    .page-title {
      margin: 7px 0 0;
      color: #fff;
      font-size: 28px;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .page-summary {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn {
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 14px;
      color: #eaf6ff;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(210, 230, 255, 0.2);
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 900;
      white-space: nowrap;
      transition: 160ms ease;
      backdrop-filter: blur(10px);
    }

    .btn:hover,
    .btn:focus-visible {
      outline: none;
      transform: translateY(-1px);
      border-color: rgba(38, 212, 255, 0.55);
      box-shadow: 0 12px 28px rgba(34, 183, 255, 0.16);
    }

    .btn.primary {
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, #e60012, #22b7ff 58%, #8b5cf6);
      box-shadow: 0 14px 32px rgba(34, 183, 255, 0.22);
    }

    .btn-icon {
      width: 18px;
      height: 18px;
      display: inline-block;
    }

    .overview-progress {
      display: none;
      grid-column: 1 / -1;
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .overview-progress.visible {
      display: block;
    }

    .overview-progress span {
      display: block;
      width: 0;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #7c9bbd, #22b7ff, #f97316, #e60012, #8b5cf6, #22c55e);
    }

    .content-shell {
      display: grid;
      gap: 12px;
      animation: fadeSlide 300ms ease both;
    }

    .stage,
    .compare-card,
    .side-card,
    .speaker-card,
    .conclusion {
      border: 1px solid rgba(191, 221, 255, 0.2);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.11), rgba(255, 255, 255, 0.065));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .stage {
      height: clamp(360px, 38vh, 410px);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .stage svg {
      display: block;
      width: 100%;
      height: 100%;
    }

    .tag-rail {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .tag {
      position: relative;
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      border-radius: 999px;
      color: #eaf6ff;
      background: rgba(255, 255, 255, 0.09);
      border: 1px solid rgba(255, 255, 255, 0.14);
      font-size: 12px;
      font-weight: 900;
      cursor: default;
    }

    .tag.good {
      border-color: rgba(34, 197, 94, 0.36);
      background: rgba(34, 197, 94, 0.12);
    }

    .tag.weak {
      border-color: rgba(124, 155, 189, 0.36);
      background: rgba(124, 155, 189, 0.15);
    }

    .tag.risk {
      border-color: rgba(239, 68, 68, 0.42);
      background: rgba(239, 68, 68, 0.14);
    }

    .tag.security {
      border-color: rgba(249, 115, 22, 0.42);
      background: rgba(249, 115, 22, 0.14);
    }

    .tag::after {
      content: attr(data-tip);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 8px);
      width: 220px;
      padding: 9px 10px;
      border-radius: var(--radius);
      color: #fff;
      background: rgba(2, 8, 20, 0.96);
      border: 1px solid rgba(255, 255, 255, 0.16);
      font-weight: 500;
      line-height: 1.45;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 6px);
      transition: 160ms ease;
      z-index: 8;
      box-shadow: 0 14px 30px rgba(0, 0, 0, 0.36);
    }

    .tag:hover::after {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .lower-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.32fr) minmax(330px, 0.68fr);
      gap: 12px;
    }

    .compare-card,
    .side-card,
    .speaker-card {
      border-radius: var(--radius);
      padding: 14px 16px;
    }

    .compare-title,
    .side-title {
      margin: 0 0 10px;
      color: #fff;
      font-size: 16px;
      line-height: 1.25;
    }

    .compare-columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .mini-panel {
      min-width: 0;
      padding: 12px;
      border-radius: var(--radius);
      background: rgba(0, 0, 0, 0.16);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .mini-panel.recommend {
      border-color: color-mix(in srgb, var(--accent-current, var(--cyan)) 42%, white 8%);
      background: linear-gradient(180deg, color-mix(in srgb, var(--accent-current, var(--cyan)) 14%, transparent), rgba(255, 255, 255, 0.06));
    }

    .mini-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      color: #fff;
      font-weight: 900;
      font-size: 14px;
    }

    .mini-title::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--muted-2);
    }

    .mini-panel.recommend .mini-title::before {
      background: var(--accent-current, var(--cyan));
      box-shadow: 0 0 0 5px color-mix(in srgb, var(--accent-current, var(--cyan)) 18%, transparent);
    }

    ul {
      margin: 0;
      padding: 0;
      list-style: none;
    }

    li {
      position: relative;
      padding-left: 13px;
      margin: 6px 0;
      color: #c5d5eb;
      font-size: 12px;
      line-height: 1.42;
    }

    li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0.7em;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent-current, var(--cyan));
    }

    .side-stack {
      display: grid;
      gap: 12px;
    }

    .scenario-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .scenario {
      padding: 6px 9px;
      border-radius: 999px;
      color: #eaf6ff;
      background: color-mix(in srgb, var(--accent-current, var(--cyan)) 16%, transparent);
      border: 1px solid color-mix(in srgb, var(--accent-current, var(--cyan)) 36%, transparent);
      font-size: 12px;
      font-weight: 900;
    }

    .footer-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: stretch;
    }

    .conclusion {
      min-height: 56px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius);
      color: #eaf6ff;
      font-weight: 900;
      line-height: 1.42;
    }

    .conclusion strong {
      color: var(--accent-current, var(--cyan));
      white-space: nowrap;
    }

    .speaker-card {
      display: none;
      max-width: 720px;
      color: #d8e8ff;
      line-height: 1.55;
    }

    .speaker-card.visible {
      display: block;
      animation: fadeSlide 220ms ease both;
    }

    /* SVG 公共风格 */
    .svg-grid {
      fill: url(#stageBg);
    }

    .svg-title {
      fill: #f5fbff;
      font-size: 21px;
      font-weight: 900;
    }

    .svg-subtitle {
      fill: #a8bbd4;
      font-size: 13px;
      font-weight: 700;
    }

    .node-label {
      fill: #f5fbff;
      font-size: 12px;
      font-weight: 900;
    }

    .node-note {
      fill: #a8bbd4;
      font-size: 10.5px;
      font-weight: 700;
    }

    .device {
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.28));
    }

    .glass-node {
      fill: rgba(255, 255, 255, 0.1);
      stroke: rgba(207, 229, 255, 0.36);
      stroke-width: 1.4;
    }

    .link-muted {
      fill: none;
      stroke: #7c9bbd;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 8 9;
      opacity: 0.72;
      animation: dashFlow 2.2s linear infinite;
    }

    .link-flow {
      fill: none;
      stroke: var(--flow, #22b7ff);
      stroke-width: var(--flow-width, 8);
      stroke-linecap: round;
      stroke-dasharray: 18 18;
      animation: dashFlow 1.25s linear infinite;
      filter: drop-shadow(0 0 9px color-mix(in srgb, var(--flow, #22b7ff) 58%, transparent));
    }

    .link-back {
      fill: none;
      stroke: color-mix(in srgb, var(--flow, #22b7ff) 20%, transparent);
      stroke-width: calc(var(--flow-width, 8) + 10px);
      stroke-linecap: round;
      filter: drop-shadow(0 0 12px color-mix(in srgb, var(--flow, #22b7ff) 38%, transparent));
    }

    .attack-flow {
      fill: none;
      stroke: #1f0508;
      stroke-width: 6;
      stroke-linecap: round;
      stroke-dasharray: 12 10;
      animation: dashFlow 0.9s linear infinite;
      filter: drop-shadow(0 0 8px rgba(239, 68, 68, 0.72));
    }

    .attack-red {
      fill: none;
      stroke: #ef4444;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 8 10;
      animation: dashFlow 0.7s linear infinite;
    }

    .flow-reverse {
      animation-direction: reverse;
    }

    .badge {
      fill: rgba(255, 255, 255, 0.12);
      stroke: rgba(255, 255, 255, 0.22);
      stroke-width: 1;
    }

    .badge-text {
      fill: #f5fbff;
      font-size: 11px;
      font-weight: 900;
    }

    .badge-good { fill: rgba(34, 197, 94, 0.16); stroke: rgba(34, 197, 94, 0.48); }
    .badge-risk { fill: rgba(239, 68, 68, 0.16); stroke: rgba(239, 68, 68, 0.48); }
    .badge-warn { fill: rgba(249, 115, 22, 0.16); stroke: rgba(249, 115, 22, 0.48); }
    .badge-blue { fill: rgba(34, 183, 255, 0.16); stroke: rgba(34, 183, 255, 0.48); }
    .badge-purple { fill: rgba(139, 92, 246, 0.18); stroke: rgba(139, 92, 246, 0.52); }

    .fade-1, .fade-2, .fade-3, .fade-4, .fade-5, .fade-6 {
      opacity: 0;
      animation: fadeIn 680ms ease both;
    }
    .fade-1 { animation-delay: .18s; }
    .fade-2 { animation-delay: .48s; }
    .fade-3 { animation-delay: .78s; }
    .fade-4 { animation-delay: 1.08s; }
    .fade-5 { animation-delay: 1.38s; }
    .fade-6 { animation-delay: 1.68s; }

    .pulse {
      animation: pulseDot 1.2s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .float {
      animation: floatSoft 3.8s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .jitter {
      animation: jitter 1s ease-in-out infinite;
      transform-box: fill-box;
      transform-origin: center;
    }

    .liquid-a { animation: liquidA 4s ease-in-out infinite; transform-origin: bottom; transform-box: fill-box; }
    .liquid-b { animation: liquidB 4.4s ease-in-out infinite; transform-origin: bottom; transform-box: fill-box; }
    .liquid-c { animation: liquidC 3.8s ease-in-out infinite; transform-origin: bottom; transform-box: fill-box; }
    .ip-1 { animation: ipOne 6s steps(1, end) infinite; }
    .ip-2 { opacity: 0; animation: ipTwo 6s steps(1, end) infinite; }
    .ip-3 { opacity: 0; animation: ipThree 6s steps(1, end) infinite; }
    .auth-ring { animation: authRing 1.8s ease-out infinite; transform-box: fill-box; transform-origin: center; }
    .stage-ordinary { animation: ordinaryPhase 8s ease-in-out infinite; }
    .stage-recommend { opacity: 0; animation: recommendPhase 8s ease-in-out infinite; }
    .fault-main { animation: faultMain 8s ease-in-out infinite; }
    .backup-on { animation: backupOn 8s ease-in-out infinite; }
    .timeline-step { cursor: pointer; }
    .timeline-step:hover .glass-node { stroke-width: 2.2; }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      to { opacity: 1; }
    }

    @keyframes dashFlow {
      to { stroke-dashoffset: -72; }
    }

    @keyframes pulseDot {
      0%, 100% { opacity: .45; transform: scale(.82); }
      50% { opacity: 1; transform: scale(1.18); }
    }

    @keyframes floatSoft {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    @keyframes jitter {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(2px, -1px); }
      50% { transform: translate(-2px, 1px); }
      75% { transform: translate(1px, 2px); }
    }

    @keyframes liquidA {
      0%, 100% { transform: scaleY(.72); }
      50% { transform: scaleY(.92); }
    }

    @keyframes liquidB {
      0%, 100% { transform: scaleY(.54); }
      50% { transform: scaleY(.74); }
    }

    @keyframes liquidC {
      0%, 100% { transform: scaleY(.32); }
      50% { transform: scaleY(.56); }
    }

    @keyframes ipOne {
      0%, 32% { opacity: 1; }
      33%, 100% { opacity: 0; }
    }

    @keyframes ipTwo {
      0%, 32% { opacity: 0; }
      33%, 65% { opacity: 1; }
      66%, 100% { opacity: 0; }
    }

    @keyframes ipThree {
      0%, 65% { opacity: 0; }
      66%, 100% { opacity: 1; }
    }

    @keyframes authRing {
      0% { opacity: .8; transform: scale(.7); }
      100% { opacity: 0; transform: scale(1.35); }
    }

    @keyframes ordinaryPhase {
      0%, 43% { opacity: 1; }
      58%, 100% { opacity: .26; }
    }

    @keyframes recommendPhase {
      0%, 42% { opacity: 0; transform: translateY(10px); }
      58%, 100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes faultMain {
      0%, 48% { stroke: #e60012; opacity: 1; }

    let missionAnswers = loadMissionAnswers();

    function loadMissionAnswers() {
      try {
        return JSON.parse(localStorage.getItem(missionStorageKey) || "{}") || {};
      } catch (error) {
        return {};
      }
    }

    function saveMissionAnswers() {
      try {
        localStorage.setItem(missionStorageKey, JSON.stringify(missionAnswers));
      } catch (error) {
        // 本地文件或隐私模式可能禁用 localStorage，互动仍可在当前页面继续。
      }
    }

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function colorFor(page) {
      return colors[page.key] || colors.dia;
    }

    function listMarkup(items) {
      return `<ul>${items.map(item => `<li>${item}</li>`).join("")}</ul>`;
    }

    function renderNav() {
      navList.innerHTML = pages.map((page, index) => {
        const [accent, accent2] = colorFor(page);
        return `
          <button class="nav-item ${index === currentIndex ? "active" : ""}" type="button" data-index="${index}" style="--accent:${accent};--accent2:${accent2}">
            <span class="nav-icon">${page.icon}</span>
            <span>
              <span class="nav-kicker"><span class="nav-no">${page.no}</span><span class="nav-title">${page.nav}</span></span>
              <span class="nav-note">${page.note}</span>
            </span>
          </button>
        `;
      }).join("");
    }

    function renderScene(index, options = {}) {
      currentIndex = (index + pages.length) % pages.length;
      const page = pages[currentIndex];
      const [accent, accent2] = colorFor(page);
      document.documentElement.style.setProperty("--accent-current", accent);
      document.documentElement.style.setProperty("--accent-current-2", accent2);
      if (!options.keepSpeaker) showSpeaker = false;

      renderNav();
      sceneEyebrow.textContent = page.eyebrow;
      pageTitle.textContent = page.title;
      pageSummary.textContent = page.summary;
      pageCount.textContent = `${page.no} / ${String(pages.length).padStart(2, "0")}`;

      if (page.type === "mission") {
        contentShell.classList.add("mission-mode");
        contentShell.classList.remove("paper-mode");
        renderMissionPage(page);
        speakerCard.classList.toggle("visible", showSpeaker);
        speakerBtn.setAttribute("aria-expanded", String(showSpeaker));
        contentShell.style.animation = "none";
        void contentShell.offsetWidth;
        contentShell.style.animation = "";
        return;
      }

      if (page.type === "paper") {
        contentShell.classList.add("paper-mode");
        contentShell.classList.remove("mission-mode");
        renderPaperPage();
        speakerCard.textContent = page.speaker;
        speakerCard.classList.toggle("visible", showSpeaker);
        speakerBtn.setAttribute("aria-expanded", String(showSpeaker));
        contentShell.style.animation = "none";
        void contentShell.offsetWidth;
        contentShell.style.animation = "";
        return;
      }

      contentShell.classList.remove("mission-mode", "paper-mode");
      svgStage.innerHTML = page.svg();

      tagRail.innerHTML = page.tags.map(([text, tip, type]) =>
        `<span class="tag ${type}" data-tip="${tip}">${text}</span>`
      ).join("");

      compareCard.innerHTML = `
        <h2 class="compare-title">${page.compareTitle}</h2>
        <div class="compare-columns">
          <div class="mini-panel">
            <div class="mini-title">${page.leftTitle}</div>
            ${listMarkup(page.leftItems)}
          </div>
          <div class="mini-panel recommend">
            <div class="mini-title">${page.rightTitle}</div>
            ${listMarkup(page.rightItems)}
          </div>
        </div>
      `;

      scenarioCard.innerHTML = `
        <h2 class="side-title">适合场景</h2>
        <div class="scenario-list">${page.scenarios.map(item => `<span class="scenario">${item}</span>`).join("")}</div>
      `;

      boundaryCard.innerHTML = `
        <h2 class="side-title">${page.boundaryTitle}</h2>
        ${listMarkup(page.boundaryItems)}
      `;

      coreConclusion.innerHTML = `<strong>核心结论</strong><span>${page.conclusion}</span>`;
      speakerCard.textContent = page.speaker;
      speakerCard.classList.toggle("visible", showSpeaker);
      speakerBtn.setAttribute("aria-expanded", String(showSpeaker));

      contentShell.style.animation = "none";
      void contentShell.offsetWidth;
      contentShell.style.animation = "";
    }

    function selectedOptionsFor(missionKey, challengeId) {
      const bucket = missionAnswers[missionKey] || {};
      return new Set(bucket[challengeId] || []);
    }

    function isChallengeCorrect(missionKey, challenge) {
      const selected = selectedOptionsFor(missionKey, challenge.id);
      const correct = challenge.options.filter(option => option[3]).map(option => option[0]);
      return selected.size === correct.length && correct.every(id => selected.has(id));
    }

    function scoreMission(missionKey) {
      const mission = missions[missionKey] || missions.government;
      const answered = mission.challenges.filter(challenge => selectedOptionsFor(missionKey, challenge.id).size > 0).length;
      const hit = mission.challenges.filter(challenge => isChallengeCorrect(missionKey, challenge)).length;
      const total = mission.challenges.length;
      const missed = mission.challenges
        .filter(challenge => !isChallengeCorrect(missionKey, challenge))
        .map(challenge => challenge.title);
      return {
        answered,
        hit,
        total,
        percent: Math.round((hit / total) * 100),
        missed
      };
    }

        return `
          <path class="link-back" style="--flow:${color};--flow-width:4px" d="M${a.x} ${a.y} C${midX} ${a.y} ${midX} ${b.y} ${b.x} ${b.y}"/>

              <circle cx="${node.x + 18}" cy="${node.y + 19}" r="6" fill="${node.color}" class="pulse"/>

    function selectMission(key) {
      if (!missions[key]) return;
      currentMissionKey = key;
      const missionIndex = pages.findIndex(page => page.key === "mission");
      if (missionIndex >= 0) currentIndex = missionIndex;
      if (window.history && window.history.replaceState) {
        const url = new URL(window.location.href);
        url.searchParams.delete("page");
        url.searchParams.set("mission", key);
        window.history.replaceState(null, "", url);
      }
      renderScene(currentIndex, { keepSpeaker: true });
    }

    function toggleMissionOption(challengeId, optionId) {
      const mission = missions[currentMissionKey];
      const challenge = mission.challenges.find(item => item.id === challengeId);
      if (!challenge) return;
      const bucket = missionAnswers[currentMissionKey] || {};
      const current = new Set(bucket[challengeId] || []);
      if (challenge.multi) {
        current.has(optionId) ? current.delete(optionId) : current.add(optionId);
      } else {
        current.clear();
        current.add(optionId);
      }
      bucket[challengeId] = Array.from(current);
      missionAnswers[currentMissionKey] = bucket;
      saveMissionAnswers();
      renderMissionPage();
    }

    function resetMission(key) {
      if (!missions[key]) return;
      missionAnswers[key] = {};
      saveMissionAnswers();
      renderMissionPage();
    }

      overviewProgress.classList.add("visible");
      overviewFill.style.transition = "none";
      overviewFill.style.width = "0%";
      void overviewFill.offsetWidth;
      runOverviewStep(0);
    }

    function runOverviewStep(step) {
      if (step >= pages.length) {
        stopOverview(true);
        return;
      }
      renderScene(step);
      overviewFill.style.transition = "width 8s linear";
      requestAnimationFrame(() => {
        overviewFill.style.width = `${((step + 1) / pages.length) * 100}%`;
      });
      overviewTimer = window.setTimeout(() => runOverviewStep(step + 1), 8000);
    }

    function stopOverview(restorePage) {
      if (overviewTimer) {
        window.clearTimeout(overviewTimer);
        overviewTimer = null;
      }
      overviewProgress.classList.remove("visible");
      overviewFill.style.transition = "none";
      overviewFill.style.width = "0%";
      overviewBtn.innerHTML = `<svg class="btn-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>播放总览`;
      if (restorePage) renderScene(overviewReturnIndex);
    }

    navList.addEventListener("click", event => {
      const button = event.target.closest("[data-index]");
      if (!button) return;
      goToScene(Number(button.dataset.index));
    });

    svgStage.addEventListener("click", event => {
      const missionTab = event.target.closest("[data-mission-key]");
      if (missionTab) {
        selectMission(missionTab.dataset.missionKey);
        return;
      }
      const missionOption = event.target.closest("[data-challenge-id][data-option-id]");
      if (missionOption) {
        toggleMissionOption(missionOption.dataset.challengeId, missionOption.dataset.optionId);
        return;
      }
      const resetButton = event.target.closest("[data-reset-mission]");
      if (resetButton) {
        resetMission(resetButton.dataset.resetMission);
        return;
      }
      const jump = event.target.closest("[data-jump]");
      if (!jump) return;
      goToScene(Number(jump.dataset.jump));
    });

    speakerBtn.addEventListener("click", toggleSpeaker);
    replayBtn.addEventListener("click", replayCurrent);
    overviewBtn.addEventListener("click", startOverview);

    window.addEventListener("keydown", event => {
      const key = event.key.toLowerCase();
      if (key === "arrowright") goToScene(currentIndex + 1);
      if (key === "arrowleft") goToScene(currentIndex - 1);
      if (/^[1-9]$/.test(event.key) && !event.shiftKey) goToScene(Number(event.key) - 1);
      if (event.key === "0") goToScene(9);
      if (key === "q") goToScene(10);
      if (key === "w") goToScene(11);
      if (key === "e") goToScene(12);
      if (key === "r") goToScene(13);
      if (key === "t") goToScene(14);
      if (key === "y") goToScene(15);
      if (key === "u") goToScene(16);
      if (key === "i") goToScene(17);
      if (key === "o" || (event.shiftKey && event.key === "!")) goToScene(18);
    });

    renderScene(0);

    // 深链辅助：访问 ?page=10 时直接显示第 10 页；?mission=finance 可直达行业闯关。
    const query = new URLSearchParams(window.location.search);
    const requestedMission = query.get("mission");
    const requestedPage = Number(query.get("page"));
    if (requestedMission && missions[requestedMission]) {
      currentMissionKey = requestedMission;
      const missionIndex = pages.findIndex(page => page.key === "mission");
      if (missionIndex >= 0) window.requestAnimationFrame(() => renderScene(missionIndex));
    } else if (Number.isInteger(requestedPage) && requestedPage >= 1 && requestedPage <= pages.length) {
      window.requestAnimationFrame(() => renderScene(requestedPage - 1));
    }
